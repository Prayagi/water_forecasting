<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Forecast - Predict Capacity</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Raleway', sans-serif; background: #0a1128; color: #fff; min-height: 100vh; }
        .ocean-bg {
            min-height: 100vh; position: relative; overflow: hidden; padding: 40px 20px;
        }
        .ocean-bg::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(74, 159, 212, 0.18) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(26, 58, 110, 0.35) 0%, transparent 55%);
            pointer-events: none; z-index: 0;
        }
        .container {
            max-width: 600px; margin: 0 auto; position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 14px; padding: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { font-family: 'Cinzel', serif; color: #4a9fd4; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: rgba(255,255,255,0.8); }
        input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; color: #fff; font-family: 'Raleway', sans-serif; transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: #4a9fd4; background: rgba(0,0,0,0.4); }

        .btn-predict {
            width: 100%; padding: 15px; margin-top: 10px;
            background: linear-gradient(145deg, rgba(42, 109, 181, 0.9), rgba(26, 58, 110, 0.9));
            border: 1px solid rgba(74, 159, 212, 0.5); border-radius: 8px;
            color: #fff; font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-predict:hover { background: linear-gradient(145deg, rgba(58, 130, 200, 1), rgba(36, 78, 140, 1)); transform: translateY(-2px); }

        #result { margin-top: 25px; font-size: 1.2rem; text-align: center; font-weight: 600; color: #4a9fd4; min-height: 30px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #4a9fd4; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; position: relative; z-index: 2;}
        .back-link:hover { color: #fff; }
        
        .progress-bar-container {
            width: 100%; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; margin-top: 15px;
            height: 24px; display: none;
        }
        .progress-bar {
            height: 100%; background: linear-gradient(90deg, #4a9fd4, #2a6db5); width: 0%;
            transition: width 1s ease-out; position: relative;
        }
    </style>
</head>
<body>
    <div class="ocean-bg">
        <div style="max-width: 600px; margin: 0 auto;">
            <a href="menu.html" class="back-link">← Back to Menu</a>
        </div>
        <div class="container">
            <h2>Reservoir Capacity Prediction</h2>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>Rainfall (mm)</label>
                    <input type="number" id="rainfall" placeholder="e.g. 150">
                </div>
                <div class="form-group">
                    <label>Runoff Factor</label>
                    <input type="number" id="runoff" placeholder="e.g. 0.4">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Inflow (cumecs)</label>
                    <input type="number" id="inflow" placeholder="e.g. 1200">
                </div>
                <div class="form-group">
                    <label>Outflow (cumecs)</label>
                    <input type="number" id="outflow" placeholder="e.g. 800">
                </div>
            </div>

            <button class="btn-predict" onclick="predict()">Predict Capacity</button>
            <div id="result"></div>
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
    </div>

    <script>
    async function predict() {
        const btn = document.querySelector('.btn-predict');
        const resDiv = document.getElementById("result");
        const progressContainer = document.getElementById("progressContainer");
        const progressBar = document.getElementById("progressBar");
        
        btn.innerText = "Predicting...";
        resDiv.innerText = "";
        progressContainer.style.display = "none";
        progressBar.style.width = "0%";
        
        const data = {
            Rainfall_mm: Number(document.getElementById("rainfall").value) || 0,
            Inflow_cumecs: Number(document.getElementById("inflow").value) || 0,
            Outflow_cumecs: Number(document.getElementById("outflow").value) || 0,
            Runoff_Factor: Number(document.getElementById("runoff").value) || 0
        };

        try {
            const response = await fetch("http://127.0.0.1:5002/predict_capacity", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            if (!response.ok) throw new Error("Server response was not ok.");

            const result = await response.json();
            const percentage = result.predicted_capacity_percentage;
            
            resDiv.innerHTML = `Predicted Capacity: <span style="color:#fff">${percentage}%</span>`;
            
            progressContainer.style.display = "block";
            // slight delay to allow CSS transition to play
            setTimeout(() => {
                progressBar.style.width = percentage + "%";
                // Color formatting based on percentage
                if(percentage < 30) progressBar.style.background = "linear-gradient(90deg, #ff4d4d, #cc0000)";
                else if (percentage < 70) progressBar.style.background = "linear-gradient(90deg, #ffa64d, #cc6600)";
                else progressBar.style.background = "linear-gradient(90deg, #4a9fd4, #2a6db5)";
            }, 50);

        } catch (error) {
            resDiv.innerHTML = `<span style="color:#ff6b6b">❌ Error connecting to prediction server. Is the capacity_model Flask app running on port 5002?</span>`;
        } finally {
            btn.innerText = "Predict Capacity";
        }
    }
    </script>
</body>
</html>
