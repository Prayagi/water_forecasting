<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqua Forecast - Water Demand</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Raleway', sans-serif; background: #0a1128; color: #fff; min-height: 100vh; }
        .ocean-bg {
            min-height: 100vh; position: relative; overflow: hidden; padding: 40px 20px;
        }
        .ocean-bg::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(74, 159, 212, 0.18) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(26, 58, 110, 0.35) 0%, transparent 55%);
            pointer-events: none; z-index: 0;
        }
        .container {
            max-width: 600px; margin: 0 auto; position: relative; z-index: 2;
            background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.13);
            border-radius: 14px; padding: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { font-family: 'Cinzel', serif; color: #4a9fd4; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: rgba(255,255,255,0.8); }
        input, select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px; color: #fff; font-family: 'Raleway', sans-serif; transition: all 0.3s ease;
        }
        input:focus, select:focus { outline: none; border-color: #4a9fd4; background: rgba(0,0,0,0.4); }
        option { background: #0a1128; color: #fff; }

        .btn-predict {
            width: 100%; padding: 15px; margin-top: 10px;
            background: linear-gradient(145deg, rgba(42, 109, 181, 0.9), rgba(26, 58, 110, 0.9));
            border: 1px solid rgba(74, 159, 212, 0.5); border-radius: 8px;
            color: #fff; font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-predict:hover { background: linear-gradient(145deg, rgba(58, 130, 200, 1), rgba(36, 78, 140, 1)); transform: translateY(-2px); }

        #result { margin-top: 25px; font-size: 1.2rem; text-align: center; font-weight: 600; color: #4a9fd4; min-height: 30px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #4a9fd4; text-decoration: none; font-size: 0.9rem; transition: color 0.3s; position: relative; z-index: 2;}
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="ocean-bg">
        <div style="max-width: 600px; margin: 0 auto;">
            <a href="menu.html" class="back-link">← Back to Menu</a>
        </div>
        <div class="container">
            <h2>Water Demand Prediction</h2>
            
            <div class="grid-2">
                <div class="form-group">
                    <label>City</label>
                    <select id="city">
                        <option>Bhopal</option>
                        <option>Indore</option>
                        <option>Jabalpur</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Season</label>
                    <select id="season">
                        <option>Summer</option>
                        <option>Monsoon</option>
                        <option>Winter</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Temperature (°C)</label>
                    <input type="number" id="temp" placeholder="e.g. 35">
                </div>
                <div class="form-group">
                    <label>Rainfall (mm)</label>
                    <input type="number" id="rain" placeholder="e.g. 10">
                </div>
            </div>

            <div class="form-group">
                <label>Population</label>
                <input type="number" id="pop" placeholder="e.g. 2000000">
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Reservoir Level (%)</label>
                    <input type="number" id="res" placeholder="e.g. 75">
                </div>
                <div class="form-group">
                    <label>Water Tariff</label>
                    <input type="number" id="tariff" placeholder="e.g. 15">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label>Previous Day Demand</label>
                    <input type="number" id="lag1" placeholder="e.g. 500">
                </div>
                <div class="form-group">
                    <label>Last Week Demand</label>
                    <input type="number" id="lag7" placeholder="e.g. 480">
                </div>
            </div>

            <button class="btn-predict" onclick="predict()">Predict Demand</button>
            <div id="result"></div>
        </div>
    </div>

    <script>
    async function predict() {
        const btn = document.querySelector('.btn-predict');
        const resDiv = document.getElementById("result");
        btn.innerText = "Predicting...";
        resDiv.innerText = "";
        
        const data = {
            Temperature: Number(document.getElementById("temp").value) || 0,
            Rainfall: Number(document.getElementById("rain").value) || 0,
            Population: Number(document.getElementById("pop").value) || 0,
            Reservoir_Level: Number(document.getElementById("res").value) || 0,
            Water_Tariff: Number(document.getElementById("tariff").value) || 0,
            Holiday: 0,
            lag_1: Number(document.getElementById("lag1").value) || 0,
            lag_7: Number(document.getElementById("lag7").value) || 0,
            City: document.getElementById("city").value,
            Season: document.getElementById("season").value
        };

        try {
            const response = await fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            if (!response.ok) throw new Error("Server response was not ok.");

            const result = await response.json();
            resDiv.innerHTML = `Predicted Water Demand: <span style="color:#fff">${result.prediction.toLocaleString()} units</span>`;
        } catch (error) {
            resDiv.innerHTML = `<span style="color:#ff6b6b">❌ Error connecting to prediction server. Is the Flask app running?</span>`;
        } finally {
            btn.innerText = "Predict Demand";
        }
    }
    </script>
</body>
</html>
